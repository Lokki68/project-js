<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Password Generator JS</title>
  </head>
  <body>
    <div class="container">
      <h2>Password Generator</h2>
      <div class="wrapper">
        <div class="input-box">
          <input type="text" disabled />
          <span class="material-symbols-rounded">copy_all</span>
        </div>
        <div class="pass-indicator"></div>
        <div class="pass-length">
          <div class="details">
            <p class="title">Password Length</p>
            <span>15</span>
          </div>
          <input
            type="range"
            min="1"
            max="30"
            value="15"
            step="1"
            id="password-length"
          />
        </div>

        <div class="pass-settings">
          <p class="title">Password Settings</p>
          <ul class="options">
            <li class="option">
              <input type="checkbox" name="lowercase" id="lowercase" />
              <label for="lowercase">Lowercase (a-z)</label>
            </li>
            <li class="option">
              <input type="checkbox" name="uppercase" id="uppercase" />
              <label for="uppercase">Uppercase (A-Z)</label>
            </li>
            <li class="option">
              <input type="checkbox" name="numbers" id="numbers" />
              <label for="numbers">Numbers (0-9)</label>
            </li>
            <li class="option">
              <input type="checkbox" name="symbols" id="symbols" />
              <label for="symbols">Symbols (!@#$%^&*)</label>
            </li>
            <li class="option">
              <input type="checkbox" name="exc-duplicate" id="exc-duplicate" />
              <label for="exc-duplicate">Exclude Duplicate Characters</label>
            </li>
            <li class="option">
              <input type="checkbox" name="spaces" id="spaces" />
              <label for="spaces">Include Spaces ( )</label>
            </li>
          </ul>
        </div>

        <button id="generate-btn">Generate Password</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
