<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qr Code Generator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <section>
      <div class="row">
        <input type="color" class="light" value="#fff" />
        <input type="color" class="dark" />
        <select class="sizes">
          <option value="100">100*100</option>
          <option value="200">200*200</option>
          <option value="300">300*300</option>
          <option value="400" selected>400*400</option>
          <option value="500">500*500</option>
          <option value="600">600*600</option>
          <option value="700">700*700</option>
          <option value="800">800*800</option>
          <option value="900">900*900</option>
          <option value="1000">1000*1000</option>
        </select>
      </div>
      <input type="text" class="qr-text" placeholder="Enter QR text" />
      <div id="qr-code"></div>
      <div class="action-container">
        <a href="#" class="btn download" download="QRCode">
          <span> Download </span>
          <span class="material-symbols-rounded icon"> download </span>
        </a>
        <button type="button" class="btn share-btn">
          <span>Share</span>
          <span class="material-symbols-rounded icon"> share </span>
        </button>
      </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
